<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7c3aed">
    <title>LM | PASSO - Gestão de Pedidos</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="css/main.css">
    <!-- Ionicons (local) -->
    <script type="module" src="/libs/ionicons/ionicons.esm.js"></script>
    <script nomodule src="/libs/ionicons/ionicons.js"></script>
</head>

<body>
    <div id="app">Carregando aplicação... (Se esta mensagem não sumir, o Javascript não carregou)</div>

    <!-- Application Logic -->
    <script type="module" src="js/app.js"></script>

    <!-- Service Worker Registration + Auto-Update -->
    <script>
        if ('serviceWorker' in navigator) {
            let refreshing = false;

            // When a new SW takes control, reload the page once
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    console.log('[SW] Nova versão ativa — recarregando...');
                    window.location.reload();
                }
            });

            window.addEventListener('load', async () => {
                // ─── NUKE OLD BROKEN CACHES ─────────────────────────────────────
                // If a previously-corrupted SW is intercepting /uploads and blocking
                // all images, we need to unregister ALL old SWs and delete all caches
                // before re-registering the clean version.
                try {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (const reg of regs) {
                        // Only unregister if it's an older version (not our current sw.js)
                        const swUrl = reg.active?.scriptURL || reg.installing?.scriptURL || '';
                        if (swUrl.includes('/sw.js')) {
                            // Same file — just update it, don't unregister
                            continue;
                        }
                        await reg.unregister();
                        console.log('[SW] Antigo SW desregistrado:', swUrl);
                    }
                    // Delete any old caches that might block images
                    const keys = await caches.keys();
                    for (const key of keys) {
                        if (key !== 'lm-passo-v31') {
                            await caches.delete(key);
                            console.log('[SW] Cache antigo deletado:', key);
                        }
                    }
                } catch(e) {
                    console.warn('[SW] Limpeza preventiva falhou (ignorando):', e);
                }
                // ─────────────────────────────────────────────────────────────────

                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('[SW] Registrado:', reg.scope);

                    // Check for update immediately on load
                    reg.update();

                    // If a new SW is already waiting, skip waiting right away
                    if (reg.waiting) {
                        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                    }

                    // When a new SW installs and starts waiting, tell it to activate
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        if (!newWorker) return;

                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[SW] Nova versão instalada — ativando...');
                                newWorker.postMessage({ type: 'SKIP_WAITING' });
                            }
                        });
                    });

                    // Check for updates every 60 seconds while the app is open
                    setInterval(() => reg.update(), 60 * 1000);

                }).catch(err => console.log('[SW] Erro:', err));
            });
        }
    </script>
</body>

</html>
